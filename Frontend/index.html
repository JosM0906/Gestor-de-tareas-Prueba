<!DOCTYPE html>
    <html lang="en"> <!--el atributo lang especifica el idioma del documento -->
<head>
    <meta charset="UTF-8"> <!--especifica la codificación de caracteres del documento -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!--hace que el diseño sea responsivo en dispositivos móviles -->
    <title>Gestor de Tareas</title> <!--título de la página que se muestra en la pestaña del navegador -->
    <link rel="stylesheet" href="styles.css"> <!--enlace a la hoja de estilos CSS para aplicar estilos a la página -->
</head>
<body>
    <main> <!--elemento principal del documento que contiene el contenido central de la página -->
        <section id="login-section" class="card"> <!--sección para el formulario de inicio de sesión, con una clase "card" para aplicar estilos -->
            <h1>Iniciar Sesión</h1>
            <form id="login-form">
                <input type="text" id="login-username" placeholder="Usuario" required>
                <input type="password" id="login-password" placeholder="Contraseña" required>
                <button type="submit">Iniciar Sesión</button>
            </form>
            <p id="login-message"></p>
        </section>

        <section id="app-section" class="hidden"> <!--sección para la aplicación principal, inicialmente oculta con la clase "hidden" -->
            <header class="topbar"> <!--encabezado de la aplicación con una clase "topbar" para aplicar estilos -->
                <div>
                    <h2>Gestor de Tareas</h2>
                    <p id="current-user-info"></p> <!--elemento para mostrar información del usuario actual y rol-->
                </div>
                <button id="logout-button">Cerrar Sesión</button>
            </header>

            <section id="admin-section" class="card hidden"> <!--seccion para administradores de usuarios, puede mostrarse solo si quien inicia sesion es admin -->
                <h3>Crear Usuarios</h3>
                <form id="user-form"> <!--formulario para crear nuevos usuarios, con campos para nombre de usuario, contraseña y rol -->
                    <input type="text" id="new-username" placeholder="Nuevo Usuario" required>
                    <input type="password" id="new-password" placeholder="Contraseña" required>
                    <select id="new-role">
                        <option value="Usuario">Usuario</option>
                        <option value="Administrador">Administrador</option>
                    </select>
                    <button type="submit">Crear Usuario</button> 
                </form>
                <p id="user-message"></p> <!--elemento para mostrar mensajes relacionados con la creación de usuarios, como éxito o error -->
            </section>

            <section class="card"> <!--sección para la creacion de tareas -->
                <h3>Crear Tarea</h3>
                <form id="task-form"> <!--formulario para crear nuevas tareas, con campos para título, fecha de creación, fecha de vencimiento y estado -->
                <input type="text" id="task-tittle" placeholder="Título de la tarea" required> <!--campo de texto para el título de la tarea, con un marcador de posición y marcado como obligatorio -->
                <input type="date" id="task-created-at" required>
                <input type="date" id="task-due-date" required>
                <select id="task-status" required> <!--campo de selección para el estado de la tarea, con opciones para "Pendiente" y "Completada", marcado como obligatorio -->
                    <option value="Pendiente">Pendiente</option>
                    <option value="Completada">Completada</option>
                </select>
                <select id="task-user" required></select> <!--campo de selección para asignar la tarea a un usuario, marcado como obligatorio, las opciones se llenarán dinámicamente con los usuarios disponibles -->
                <button type="submit">Guardar Tarea</button>
                </form>
                <p id="task-message"></p><!--elemento para mostrar mensajes relacionados con la creación de tareas, como éxito o error -->
            </section>

            <section class="card"><!--sección para mostrar el listado de tareas -->
                <h3>Listado de Tareas</h3>
                <div id="task-list"></div>
            </section>
        </section>
    </main>

</body>
</html>
